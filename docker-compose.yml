services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/docs:/app/docs
      - ./backend/docs_storage:/app/docs_storage
    expose:
      - "8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
